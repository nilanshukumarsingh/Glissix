<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none">
  <!-- Rounded dark background container -->
  <rect width="96" height="96" rx="24" fill="#07111D"/>
  
  <!-- Main card with background gradient and border -->
  <rect x="8" y="8" width="80" height="80" rx="20" fill="url(#panel)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  
  <!-- Subtle top-right backdrop glow -->
  <circle cx="62.4" cy="35.2" r="27.2" fill="url(#bgGlow)"/>

  <!-- Brand logo elements scaled and centered -->
  <g transform="translate(16, 16) scale(1.6)">
    <!-- Path track representing the physical motion curve -->
    <path d="M30 10 C22 2, 10 6, 8 18 C6 30, 18 34, 28 30 C34 27, 34 20, 28 18 L18 18" stroke="url(#trackGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Central node of the pointer -->
    <circle cx="28" cy="18" r="4.5" fill="#8DD3FF"/>
    <!-- Outer halo glow around the node -->
    <circle cx="28" cy="18" r="8" fill="#8DD3FF" opacity="0.3"/>
  </g>

  <defs>
    <!-- Background linear gradient for the card -->
    <linearGradient id="panel" x1="14" y1="10" x2="82" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1726"/>
      <stop offset="1" stop-color="#0A0F17"/>
    </linearGradient>
    
    <!-- Top-right backdrop radial glow -->
    <radialGradient id="bgGlow" cx="62.4" cy="35.2" r="27.2" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8AD1FF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8AD1FF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Vibrant motion path gradient -->
    <linearGradient id="trackGrad" x1="8" y1="8" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7DD3FF"/>
      <stop offset="60%" stop-color="#46A3FF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
</svg>
